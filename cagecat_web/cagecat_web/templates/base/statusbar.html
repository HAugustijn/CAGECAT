{% block statusbar %}
<div class="position-sticky" style="top: 6rem;">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h6 class="mb-0">Your jobs</h6>
    <button type="button" class="btn btn-sm btn-link text-body-secondary p-0"
            title="Clear all jobs from this list" aria-label="Clear all jobs"
            onclick="if (window.CagecatJobs && confirm('Remove all jobs from this list? (Results on the server are unaffected.)')) CagecatJobs.clear();">
      <i class="bi bi-trash"></i>
    </button>
  </div>
  <ul class="list-unstyled" id="previousJobsOverview">
    <li class="text-body-secondary small">No jobs yet on this browser.</li>
  </ul>
  <p class="text-body-secondary mt-3" style="font-size: .72rem;">
    Jobs are stored on this browser only and kept for 30 days.
  </p>
</div>
{% endblock %}
