<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}CAGECAT{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link href="{{ url_for('static', path='css/style.css') }}?v={{ static_version }}" rel="stylesheet">
</head>
<body>

{% include 'base/navbar.html' %}

<div class="container-fluid">
    <div class="row">

        <div class="col-12 col-md-3 col-lg-2 bg-body-secondary border-end p-3" id="statusbar">
        {% include 'base/statusbar.html' %}
        </div>
        <div class="col-12 col-md-9 col-lg-10 px-4 main-gradient" id="main-content">
            <main class="mt-4">
                {% block content %}
                {% endblock %}
            </main>
        </div>
    </div>
</div>

{% include 'base/footer.html' %}

{% block scripts %}
  <script src="{{ url_for('static', path='js/main.js') }}?v={{ static_version }}"></script>
  <script src="{{ url_for('static', path='js/jobs.js') }}?v={{ static_version }}"></script>
  <script src="{{ url_for('static', path='js/theme.js') }}?v={{ static_version }}"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq" crossorigin="anonymous"></script>
{% endblock %}
</body>
</html>
