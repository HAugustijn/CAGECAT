server {
    listen 80;

    server_name localhost;

    # Allow large annotation/sequence uploads.
    client_max_body_size 100m;

    # Serve static files directly from the mounted source tree. The path matches
    # the read-only volume defined for the nginx service in docker-compose.yml.
    location /static/ {
        alias /usr/share/nginx/static/;
        expires 30d;
        access_log off;
    }

    # Proxy all other requests to FastAPI.
    location / {
        proxy_pass http://cagecat_web:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Match the gunicorn worker timeout so long-running jobs are not cut off.
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
