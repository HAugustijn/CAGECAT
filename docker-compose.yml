# CAGECAT v2 — standalone Docker stack.
#
# Host-facing ports are read from a git-ignored `.env` file (see `.env.example`).

x-app-environment: &app-environment
  PYTHONUNBUFFERED: "1"
  # Celery broker/result backend.
  REDIS_URL: "redis://redis:6379/0"
  JOBS_DIR: "/data/jobs"
  JOB_RETENTION_DAYS: "30"
  PFAM_DIR: "/data/pfam"
  DATABASES_DIR: "/data/databases"
  # NCBI contact e-mail used by cblaster for remote searches (set in .env).
  CBLASTER_EMAIL: "${CBLASTER_EMAIL:-}"
  CBLASTER_API_KEY: "${CBLASTER_API_KEY:-}"

services:
  redis:
    image: redis:7
    restart: unless-stopped
    expose:
      - "6379"

  cagecat_web:
    build:
      context: .
      dockerfile: ./compose/cagecat_web/Dockerfile
    volumes:
      - ./cagecat_web/cagecat_web/routes:/cagecat_web/cagecat_web/routes
      - ./cagecat_web/cagecat_web/templates:/cagecat_web/cagecat_web/templates
      - ./cagecat_web/cagecat_web/static:/cagecat_web/cagecat_web/static
      # Persistent data on the host: ./data/jobs (per-job UUID folders with
      # input/, output/, logs/), ./data/pfam (Pfam profiles), ./data/databases.
      - ./data:/data
    depends_on:
      - redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WEB_PORT:-8004}:8004"
    environment:
      <<: *app-environment

  celery_worker:
    build:
      context: .
      dockerfile: ./compose/cagecat_web/Dockerfile
    command:
      - celery
      - -A
      - cagecat_web.celery_app.celery_app
      - worker
      - --loglevel=info
      - --concurrency=2
    volumes:
      - ./data:/data
    depends_on:
      - redis
    restart: unless-stopped
    environment:
      <<: *app-environment

  nginx:
    build:
      context: .
      dockerfile: ./compose/nginx/Dockerfile
    depends_on:
      - cagecat_web
    volumes:
      - ./cagecat_web/cagecat_web/static:/usr/share/nginx/static:ro
    restart: unless-stopped
    # Main public entry point for the web interface.
    ports:
      - "${HTTP_PORT:-1340}:80"
